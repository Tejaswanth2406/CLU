name: Bug Report
description: Report a bug in CLU
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug in CLU!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Paste document text
        2. Click Analyze
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options: [Chrome, Firefox, Safari, Edge, Other]

  - type: input
    id: version
    attributes:
      label: CLU version
      placeholder: "e.g. 1.0.0"
